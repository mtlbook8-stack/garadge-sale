<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מוכרים לפני יציאה מהארץ</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #666;
    --light: #f5f3ef;
    --border: #ddd;
    --accent: #c0392b;
    --cat-bg: #f0ede8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: #faf8f5;
    color: var(--ink);
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── SCREEN STYLES ── */
  .page-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1.25rem;
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1.75rem;
    align-items: center;
  }

  .controls button {
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 400;
  }

  .controls button:hover { border-color: var(--ink); }
  .controls button.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
    font-weight: 500;
  }

  .print-btn {
    margin-right: auto;
    background: var(--accent) !important;
    color: white !important;
    border-color: var(--accent) !important;
    font-weight: 500 !important;
  }

  .print-btn:hover { opacity: 0.88; }

  .summary {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  /* ── CATEGORY SECTIONS ── */
  .cat-section { margin-bottom: 2.5rem; }

  .cat-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin-bottom: 10px;
  }

  /* ── TABLE ── */
  table {
    width: 100%;
    border-collapse: collapse;
  }

  tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tr:last-child { border-bottom: none; }
  tr:hover { background: var(--light); }

  td {
    padding: 10px 8px;
    vertical-align: top;
  }

  td.name {
    font-weight: 500;
    font-size: 14.5px;
    width: 38%;
  }

  td.desc {
    font-size: 13px;
    color: var(--muted);
    width: 50%;
  }

  td.price {
    font-size: 15px;
    font-weight: 700;
    text-align: left;
    white-space: nowrap;
    color: var(--accent);
    width: 12%;
  }

  /* ── PRINT ── */
  @media print {
    @page {
      size: A4;
      margin: 15mm 15mm 15mm 15mm;
    }

    body {
      background: white;
      font-size: 12px;
      color: #000;
    }

    .controls, .summary { display: none !important; }

    .page-wrap { padding: 0; max-width: 100%; }

    header {
      padding-bottom: 8px;
      margin-bottom: 12px;
    }

    header h1 { font-size: 20px; }
    header p { font-size: 11px; }

    .cat-section { margin-bottom: 12px; page-break-inside: avoid; }
    .cat-title { font-size: 9px; padding-bottom: 3px; margin-bottom: 6px; }

    tr { page-break-inside: avoid; }

    td { padding: 5px 6px; }
    td.name { font-size: 11.5px; }
    td.desc { font-size: 10.5px; }
    td.price { font-size: 12px; }

    .hidden-by-filter { display: table-row !important; }
  }
</style>
</head>
<body>

  </header>

  <div class="controls" id="filters">

];

const cats = [...new Set(items.map(i => i.cat))];
let activeCat = "הכל";

function filterCat(btn) {
  activeCat = btn.dataset.cat;
  document.querySelectorAll('#filters button[data-cat]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
}

function renderContent() {
  const content = document.getElementById('content');
  const filtered = activeCat === "הכל" ? items : items.filter(i => i.cat === activeCat);
  const activeCats = activeCat === "הכל" ? cats : [activeCat];
  let total = 0;

  content.innerHTML = activeCats.map(cat => {
    const catItems = filtered.filter(i => i.cat === cat);
    if (!catItems.length) return '';
    return `
      <div class="cat-section">
        <div class="cat-title">${cat}</div>
        <table>
          ${catItems.map(it => {
            total += it.price;
            const soldStyle = it.sold ? ' style="text-decoration:line-through;opacity:0.55;"' : '';
            const soldBadge = it.sold ? ' <span style="font-size:11px;color:#c0392b;font-weight:600;">מכור</span>' : '';
            return `<tr${soldStyle}>
              <td class="name">${it.title}${soldBadge}</td>
              <td class="desc">${it.desc}</td>
              <td class="price">₪${it.price.toLocaleString()}</td>
            </tr>`;
          }).join('')}
        </table>
      </div>`;
  }).join('');

  document.getElementById('summary').textContent =
    `${filtered.length} פריטים · סה"כ מחיר מבוקש: ₪${filtered.reduce((s,i)=>s+i.price,0).toLocaleString()}`;
}

// Build filter buttons
const filtersDiv = document.getElementById('filters');
cats.forEach(cat => {
  const btn = document.createElement('button');
  btn.textContent = cat;
  btn.dataset.cat = cat;
  btn.onclick = () => filterCat(btn);
  filtersDiv.appendChild(btn);
});

renderContent();
</script>
</body>
</html>
